services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: chameleonflow
      POSTGRES_USER: chameleonflow
      POSTGRES_PASSWORD: chameleonflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install uv &&
      uv sync &&
      .venv/bin/uvicorn server.app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - ../../.env.example
    volumes:
      - ../../:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  postgres_data:
